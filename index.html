<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aero Planner</title>
  <meta name="theme-color" content="#0f766e">
  
  <!-- Custom Tab Icon -->
  <link rel="icon" type="image/png" href="favicon.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f4f9f9] text-slate-800 antialiased selection:bg-teal-200 selection:text-teal-900 overflow-y-scroll">
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    
    // Firebase Modular SDKs
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "AIzaSyCApFluUkql1dqrGwH5r67DO6E-L-ez-OM",
      authDomain: "blocksync-d48e5.firebaseapp.com",
      projectId: "blocksync-d48e5",
      storageBucket: "blocksync-d48e5.firebasestorage.app",
      messagingSenderId: "354921111118",
      appId: "1:354921111118:web:7b7fa1624fd0d37e402d1f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Explicit, consistent App ID for Firestore paths
    const appId = "aero_planner_teal";

    // --- DATE UTILITIES ---
    const getFormattedDateString = (date) => {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    };

    const getStartOfWeek = (date) => {
      const result = new Date(date);
      const day = result.getDay();
      const diff = result.getDate() - day + (day === 0 ? -6 : 1);
      result.setDate(diff);
      return result;
    };

    const getDaysOfWeek = (startOfWeekDate) => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const nextDay = new Date(startOfWeekDate);
        nextDay.setDate(startOfWeekDate.getDate() + i);
        days.push(nextDay);
      }
      return days;
    };

    // --- ID GENERATOR ---
    const generateShortId = () => {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    };

    function App() {
      // --- APP STATES ---
      const [activeTab, setActiveTab] = useState('week');
      const [syncStatus, setSyncStatus] = useState('Initializing...');
      const [user, setUser] = useState(null);
      
      // Cross-Device Sync State
      const [syncId, setSyncId] = useState(null);
      const [showSyncModal, setShowSyncModal] = useState(false);
      const [syncInput, setSyncInput] = useState('');

      // Data States
      const [tasks, setTasks] = useState([]);
      const [notes, setNotes] = useState({});
      
      // UI / Input States
      const [selectedDateStr, setSelectedDateStr] = useState(getFormattedDateString(new Date()));
      const [weekStart, setWeekStart] = useState(getStartOfWeek(new Date()));
      const [localJournalContent, setLocalJournalContent] = useState('');
      const [quickTaskTexts, setQuickTaskTexts] = useState({});
      
      // Typing Reference for Debounce
      const typingTimer = useRef(null);

      // 1. Initialize Sync ID (Local Storage)
      useEffect(() => {
        const storedSyncId = localStorage.getItem('aero_sync_id');
        if (storedSyncId) {
          setSyncId(storedSyncId);
        } else {
          const newId = generateShortId();
          localStorage.setItem('aero_sync_id', newId);
          setSyncId(newId);
        }
      }, []);

      // 2. Authenticate User (Anonymous)
      useEffect(() => {
        const initAuth = async () => {
          setSyncStatus('Connecting securely...');
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth Error:", err);
            setSyncStatus('Authentication Failed');
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (!currentUser) setSyncStatus('Offline');
        });

        return () => unsubscribe();
      }, []);

      // 3. Real-time Database Listeners
      useEffect(() => {
        if (!user || !syncId) return;
        setSyncStatus('Syncing database...');

        // Fetch Tasks (Using syncId for folder isolation)
        const tasksRef = collection(db, 'artifacts', appId, 'users', syncId, 'tasks');
        const unsubscribeTasks = onSnapshot(tasksRef, (snapshot) => {
          const fetchedTasks = [];
          snapshot.forEach(doc => fetchedTasks.push({ id: doc.id, ...doc.data() }));
          setTasks(fetchedTasks);
          setSyncStatus('All changes saved');
        }, (error) => {
          console.error("Tasks sync failed:", error);
          setSyncStatus('Sync Error (Tasks)');
        });

        // Fetch Notes
        const notesRef = collection(db, 'artifacts', appId, 'users', syncId, 'notes');
        const unsubscribeNotes = onSnapshot(notesRef, (snapshot) => {
          const fetchedNotes = {};
          snapshot.forEach(doc => {
            fetchedNotes[doc.id] = doc.data().content || '';
          });
          setNotes(fetchedNotes);
          setSyncStatus('All changes saved');
        }, (error) => {
          console.error("Notes sync failed:", error);
          setSyncStatus('Sync Error (Notes)');
        });

        return () => {
          unsubscribeTasks();
          unsubscribeNotes();
        };
      }, [user, syncId]);

      // 4. Update Local Journal View Safely (Avoids erasing user input)
      useEffect(() => {
        // If the user is NOT actively typing, update the textarea with cloud data
        if (!typingTimer.current) {
          const currentCloudNote = notes[selectedDateStr] || '';
          setLocalJournalContent(currentCloudNote);
        }
      }, [selectedDateStr, notes]);

      // --- JOURNAL INPUT ACTION ---
      const handleJournalChange = (e) => {
        const textValue = e.target.value;
        setLocalJournalContent(textValue); // Update UI immediately

        // Clear existing timer
        if (typingTimer.current) clearTimeout(typingTimer.current);

        // Set a new timer to save to Firebase after 1 second of inactivity
        typingTimer.current = setTimeout(async () => {
          if (!user || !syncId) return;
          setSyncStatus('Saving note...');
          
          const noteRef = doc(db, 'artifacts', appId, 'users', syncId, 'notes', selectedDateStr);
          try {
            await setDoc(noteRef, { content: textValue, date: selectedDateStr }, { merge: true });
            setSyncStatus('All changes saved');
          } catch (error) {
            console.error("Save Error:", error);
            setSyncStatus('Failed to save');
          }
          
          // Clear typing state so cloud updates can flow in again
          typingTimer.current = null;
        }, 1000);
      };

      // --- TASK ACTIONS ---
      const handleAddTask = async (dateStr, text) => {
        if (!text || !text.trim() || !user || !syncId) return;
        setSyncStatus('Saving task...');
        
        const taskId = 'task_' + Date.now();
        const newTask = {
          text: text.trim(),
          completed: false,
          date: dateStr,
          createdAt: Date.now()
        };

        // Clear input box
        setQuickTaskTexts(prev => ({ ...prev, [dateStr]: '' }));
        
        const taskRef = doc(db, 'artifacts', appId, 'users', syncId, 'tasks', taskId);
        await setDoc(taskRef, newTask);
      };

      const handleToggleTask = async (taskId, currentCompletedState) => {
        if (!user || !syncId) return;
        const taskRef = doc(db, 'artifacts', appId, 'users', syncId, 'tasks', taskId);
        await setDoc(taskRef, { completed: !currentCompletedState }, { merge: true });
      };

      const handleDeleteTask = async (taskId) => {
        if (!user || !syncId) return;
        const taskRef = doc(db, 'artifacts', appId, 'users', syncId, 'tasks', taskId);
        await deleteDoc(taskRef);
      };

      const shiftWeek = (weeksToShift) => {
        const nextWeekStart = new Date(weekStart);
        nextWeekStart.setDate(weekStart.getDate() + (weeksToShift * 7));
        setWeekStart(nextWeekStart);
      };

      const handleSyncDevice = () => {
        if (syncInput.trim().length > 0) {
          const upperId = syncInput.trim().toUpperCase();
          localStorage.setItem('aero_sync_id', upperId);
          setSyncId(upperId);
          setShowSyncModal(false);
          setSyncInput('');
          setSyncStatus('Connected to new Sync Key');
        }
      };

      // --- RENDERERS ---
      const renderWeekSpread = () => {
        const days = getDaysOfWeek(weekStart);
        return (
          <div className="space-y-6 animate-in fade-in duration-300">
            {/* Week Navigation */}
            <div className="flex flex-col sm:flex-row justify-between items-center bg-white border border-teal-100 p-4 rounded-xl shadow-sm gap-4">
              <div className="flex gap-2">
                <button onClick={() => shiftWeek(-1)} className="px-4 py-2 text-xs font-bold border border-teal-200 text-teal-700 rounded-lg hover:bg-teal-50 transition">
                  ← Previous
                </button>
                <button onClick={() => setWeekStart(getStartOfWeek(new Date()))} className="px-4 py-2 text-xs font-bold border border-teal-200 text-teal-700 rounded-lg hover:bg-teal-50 transition">
                  Current Week
                </button>
                <button onClick={() => shiftWeek(1)} className="px-4 py-2 text-xs font-bold border border-teal-200 text-teal-700 rounded-lg hover:bg-teal-50 transition">
                  Next →
                </button>
              </div>
              <span className="font-serif font-bold text-sm text-teal-800">
                Week of {weekStart.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })}
              </span>
            </div>

            {/* 7-Day Grid */}
            <div className="grid grid-cols-1 md:grid-cols-7 gap-4">
              {days.map((dayDate) => {
                const dateStr = getFormattedDateString(dayDate);
                const isToday = getFormattedDateString(new Date()) === dateStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const hasNotes = !!notes[dateStr];

                return (
                  <div key={dateStr} className={`p-4 rounded-xl border flex flex-col justify-between min-h-[340px] transition bg-white ${isToday ? 'border-teal-400 shadow-md ring-2 ring-teal-50' : 'border-teal-100 hover:border-teal-300 shadow-sm'}`}>
                    <div>
                      {/* Day Header */}
                      <div className="border-b border-teal-50 pb-2 mb-3 flex justify-between items-baseline">
                        <span className="font-serif font-bold text-slate-800 text-base">
                          {dayDate.toLocaleDateString(undefined, { weekday: 'short' })}
                        </span>
                        <div className="flex items-center gap-2">
                           {hasNotes && <span className="text-[10px] text-teal-600">📝</span>}
                           <span className={`font-mono text-xs font-bold ${isToday ? 'bg-teal-600 text-white px-2 py-0.5 rounded-full' : 'text-teal-600'}`}>
                             {dayDate.getDate()}
                           </span>
                        </div>
                      </div>

                      {/* Day Tasks */}
                      <div className="space-y-2.5 mb-4">
                        {dayTasks.map(task => (
                          <div key={task.id} className="flex items-start justify-between gap-1 group">
                            <div className="flex items-start gap-2 flex-1 cursor-pointer" onClick={() => handleToggleTask(task.id, task.completed)}>
                              <input type="checkbox" checked={task.completed} readOnly className="mt-1 rounded text-teal-600 border-teal-300 focus:ring-teal-500 w-3.5 h-3.5 cursor-pointer"/>
                              <span className={`text-[12px] leading-snug break-all select-none ${task.completed ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}`}>{task.text}</span>
                            </div>
                            <button onClick={() => handleDeleteTask(task.id)} className="opacity-0 group-hover:opacity-100 text-[10px] text-rose-400 hover:text-rose-600 px-1 font-bold transition">✕</button>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Quick Add Bottom */}
                    <div className="pt-3 border-t border-teal-50">
                      <input 
                        type="text" value={quickTaskTexts[dateStr] || ''} 
                        onChange={(e) => setQuickTaskTexts(prev => ({ ...prev, [dateStr]: e.target.value }))}
                        onKeyDown={(e) => e.key === 'Enter' && handleAddTask(dateStr, quickTaskTexts[dateStr])}
                        placeholder="+ Add task..." 
                        className="w-full text-[11px] p-2.5 border border-teal-100 rounded-lg focus:outline-none focus:border-teal-400 focus:ring-1 focus:ring-teal-400 bg-slate-50 transition"
                      />
                      <div className="flex justify-center items-center mt-3">
                        <button onClick={() => { setSelectedDateStr(dateStr); setActiveTab('journal'); }} className="text-[10px] font-bold uppercase tracking-wider text-teal-600 hover:text-teal-800 transition">
                          View Journal Entry →
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderMonthSpread = () => {
        const today = new Date();
        const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        const dayOfWeek = startOfMonth.getDay();
        const padDays = dayOfWeek === 0 ? 6 : dayOfWeek - 1; 
        
        const days = Array.from({ length: 42 }, (_, i) => {
          const cellDate = new Date(startOfMonth);
          cellDate.setDate(1 - padDays + i);
          return cellDate;
        });

        return (
          <div className="bg-white border border-teal-100 p-4 sm:p-6 rounded-xl shadow-sm space-y-6 animate-in fade-in duration-300">
            <div className="flex justify-between items-center border-b border-teal-100 pb-4">
              <h3 className="font-serif font-bold text-slate-800 text-xl">
                {today.toLocaleDateString(undefined, { month: 'long', year: 'numeric' })}
              </h3>
              <span className="text-[10px] uppercase font-bold tracking-wider text-teal-600">Monthly Grid</span>
            </div>
            
            <div className="grid grid-cols-7 gap-2 text-center text-[10px] sm:text-xs font-bold tracking-wider text-slate-400 pb-2">
              <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
            </div>
            
            <div className="grid grid-cols-7 gap-1 sm:gap-2">
              {days.map((dayDate, idx) => {
                const dateStr = getFormattedDateString(dayDate);
                const isCurrentMonth = dayDate.getMonth() === today.getMonth();
                const isToday = getFormattedDateString(new Date()) === dateStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const hasNotes = !!notes[dateStr];

                return (
                  <div key={idx} onClick={() => { setSelectedDateStr(dateStr); setActiveTab('journal'); }}
                    className={`min-h-[90px] sm:min-h-[110px] p-2 rounded-lg border flex flex-col justify-between transition cursor-pointer text-left ${isToday ? 'border-teal-400 bg-teal-50/50 shadow-sm' : isCurrentMonth ? 'border-teal-100 bg-white hover:border-teal-300' : 'opacity-40 border-dashed border-teal-100 bg-slate-50/50'}`}>
                    <div className="flex justify-between items-start">
                      <span className={`font-serif text-xs sm:text-sm font-bold ${isToday ? 'bg-teal-600 text-white w-6 h-6 flex items-center justify-center rounded-full' : 'text-slate-700'}`}>
                        {dayDate.getDate()}
                      </span>
                      {hasNotes && <span className="text-[10px] text-teal-500">📝</span>}
                    </div>
                    
                    <div className="space-y-1 overflow-hidden mt-1 sm:mt-2">
                      {dayTasks.slice(0, 3).map((t, tIdx) => (
                        <div key={tIdx} className={`text-[9px] sm:text-[10px] truncate ${t.completed ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}`}>• {t.text}</div>
                      ))}
                      {dayTasks.length > 3 && (
                        <div className="text-[9px] text-teal-600 font-bold">+{dayTasks.length - 3} more</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderJournalSpread = () => {
        // Parse date properly to display
        const parsedDateParts = selectedDateStr.split('-');
        const parsedDate = new Date(parsedDateParts[0], parsedDateParts[1] - 1, parsedDateParts[2]);
        const displayDate = parsedDate.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        const dayTasks = tasks.filter(t => t.date === selectedDateStr);

        return (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-300">
            {/* Task Panel */}
            <div className="bg-white border border-teal-100 p-6 rounded-xl shadow-sm flex flex-col justify-between">
              <div>
                <div className="border-b border-teal-100 pb-4 mb-5 flex justify-between items-baseline">
                  <h3 className="font-serif font-bold text-xl text-slate-800">Action Items</h3>
                  <span className="text-[11px] font-bold tracking-widest uppercase text-teal-600">{parsedDate.toLocaleDateString()}</span>
                </div>
                
                <div className="space-y-3 overflow-y-auto max-h-[400px] pr-1">
                  {dayTasks.map(task => (
                    <div key={task.id} className="flex items-center justify-between p-3 rounded-lg bg-slate-50 border border-teal-50 group hover:border-teal-200 transition">
                      <div className="flex items-start gap-3 flex-1 cursor-pointer" onClick={() => handleToggleTask(task.id, task.completed)}>
                        <input type="checkbox" checked={task.completed} readOnly className="mt-0.5 rounded text-teal-600 border-teal-300 focus:ring-teal-500 w-4 h-4 cursor-pointer"/>
                        <span className={`text-sm leading-snug break-all select-none ${task.completed ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}`}>{task.text}</span>
                      </div>
                      <button onClick={() => handleDeleteTask(task.id)} className="text-sm text-rose-400 opacity-0 group-hover:opacity-100 px-2 hover:text-rose-600 font-bold transition">✕</button>
                    </div>
                  ))}
                  {dayTasks.length === 0 && (
                    <div className="py-12 flex flex-col items-center justify-center opacity-40 select-none">
                      <span className="text-3xl mb-2">📋</span>
                      <p className="text-sm italic text-slate-600">No tasks scheduled for this day.</p>
                    </div>
                  )}
                </div>
              </div>
              
              <div className="pt-5 border-t border-teal-100 mt-6">
                <div className="flex flex-col gap-3">
                  <input type="text" value={quickTaskTexts[selectedDateStr] || ''} onChange={(e) => setQuickTaskTexts(prev => ({ ...prev, [selectedDateStr]: e.target.value }))} onKeyDown={(e) => e.key === 'Enter' && handleAddTask(selectedDateStr, quickTaskTexts[selectedDateStr])} placeholder="Write a new task..." className="w-full text-sm p-3 border border-teal-200 rounded-lg focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 bg-white shadow-sm"/>
                  <button onClick={() => handleAddTask(selectedDateStr, quickTaskTexts[selectedDateStr])} className="text-sm px-4 py-3 bg-teal-600 text-white rounded-lg hover:bg-teal-700 font-bold transition shadow-sm">Add to List</button>
                </div>
              </div>
            </div>

            {/* Journal Entry Panel */}
            <div className="lg:col-span-2 bg-white border border-teal-100 p-6 rounded-xl shadow-sm flex flex-col min-h-[400px] lg:h-[650px]">
              <div className="border-b border-teal-100 pb-4 mb-5 flex justify-between items-baseline">
                <h3 className="font-serif font-bold text-2xl sm:text-3xl text-slate-800">{displayDate}</h3>
                <span className="text-[10px] font-bold uppercase tracking-wider text-teal-600 hidden sm:inline">Journal Entry</span>
              </div>
              
              <textarea 
                value={localJournalContent}
                onChange={handleJournalChange}
                placeholder="Write down your thoughts, notes, and reflections for today..."
                className="flex-1 w-full text-base font-serif leading-loose p-5 bg-teal-50/30 border border-teal-50 rounded-xl focus:outline-none focus:border-teal-300 focus:ring-1 focus:ring-teal-300 resize-none transition text-slate-700 placeholder:text-slate-400"
              />
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen pb-16">
          {/* Header */}
          <header className="bg-teal-700 text-white py-4 px-6 md:px-12 flex justify-between items-center shadow-lg">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 rounded-lg bg-teal-500 flex items-center justify-center font-serif font-bold text-xl shadow-inner border border-teal-400 text-white">
                A
              </div>
              <div>
                <h1 className="font-serif font-bold text-lg tracking-tight">Aero Planner</h1>
                <p className="text-[10px] font-bold tracking-widest uppercase text-teal-200">Teal Edition</p>
              </div>
            </div>
            <div className="flex flex-col items-end gap-1">
              <div className="flex items-center gap-2 bg-teal-800/50 px-3 py-1.5 rounded-full border border-teal-600/50 shadow-inner">
                <div className={`w-2 h-2 rounded-full ${syncStatus.includes('saved') || syncStatus.includes('Online') ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'}`}></div>
                <span className="text-[10px] font-bold uppercase tracking-wider text-teal-50">{syncStatus}</span>
              </div>
              <button onClick={() => setShowSyncModal(true)} className="text-[10px] font-bold tracking-wider uppercase text-teal-200 hover:text-white transition mr-1">Link Devices</button>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-4 md:px-8 py-8">
            {/* Tab Navigation */}
            <div className="flex border-b border-teal-200 mb-8 gap-8 overflow-x-auto scrollbar-none">
              <button onClick={() => setActiveTab('week')} className={`pb-4 px-2 font-serif text-lg transition relative whitespace-nowrap ${activeTab === 'week' ? 'text-teal-700 font-bold' : 'text-slate-400 hover:text-teal-600'}`}>
                Weekly Spread{activeTab === 'week' && <span className="absolute bottom-0 left-0 right-0 h-[3px] bg-teal-600 rounded-t-md"></span>}
              </button>
              <button onClick={() => setActiveTab('month')} className={`pb-4 px-2 font-serif text-lg transition relative whitespace-nowrap ${activeTab === 'month' ? 'text-teal-700 font-bold' : 'text-slate-400 hover:text-teal-600'}`}>
                Monthly Grid{activeTab === 'month' && <span className="absolute bottom-0 left-0 right-0 h-[3px] bg-teal-600 rounded-t-md"></span>}
              </button>
              <button onClick={() => setActiveTab('journal')} className={`pb-4 px-2 font-serif text-lg transition relative whitespace-nowrap ${activeTab === 'journal' ? 'text-teal-700 font-bold' : 'text-slate-400 hover:text-teal-600'}`}>
                Daily Journal{activeTab === 'journal' && <span className="absolute bottom-0 left-0 right-0 h-[3px] bg-teal-600 rounded-t-md"></span>}
              </button>
            </div>
            
            <main>
              {activeTab === 'week' && renderWeekSpread()}
              {activeTab === 'month' && renderMonthSpread()}
              {activeTab === 'journal' && renderJournalSpread()}
            </main>
          </div>

          {/* Sync Modal */}
          {showSyncModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-in fade-in">
              <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-teal-100">
                <h2 className="font-serif font-bold text-2xl text-slate-800 mb-2">Sync Devices</h2>
                <p className="text-xs text-slate-500 mb-6 leading-relaxed">
                  To view your planner on another device, copy the code below and enter it on the other device.
                </p>
                
                <div className="bg-teal-50 p-4 rounded-xl border border-teal-100 text-center mb-6 shadow-inner">
                  <span className="text-[10px] uppercase font-bold text-teal-600 block mb-1">Your Unique Sync Key</span>
                  <span className="font-mono text-3xl tracking-widest text-teal-800 font-bold select-all">{syncId}</span>
                </div>

                <div className="mb-8">
                  <label className="text-[11px] uppercase font-bold text-slate-600 block mb-2">Link this device to existing planner</label>
                  <input 
                    type="text" 
                    value={syncInput}
                    onChange={(e) => setSyncInput(e.target.value)}
                    placeholder="Enter 6-digit Key"
                    className="w-full p-3 border border-teal-200 bg-slate-50 rounded-lg font-mono uppercase tracking-widest text-center text-lg focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500"
                  />
                  <p className="text-[10px] text-amber-600 mt-2 font-medium">Note: Linking will replace this device's current data.</p>
                </div>

                <div className="flex gap-3">
                  <button onClick={() => setShowSyncModal(false)} className="flex-1 py-3 rounded-lg text-sm font-bold border border-teal-200 text-teal-700 hover:bg-teal-50 transition">Cancel</button>
                  <button onClick={handleSyncDevice} className="flex-1 py-3 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 shadow-md transition">Link Device</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
