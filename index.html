<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aero Physical Planner</title>
  <meta name="theme-color" content="#2E251E">
  
  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="apple-touch-icon" href="logo.svg">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FAF6F0]">
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    
    // Firebase Modular SDKs
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "AIzaSyCApFluUkql1dqrGwH5r67DO6E-L-ez-OM",
      authDomain: "blocksync-d48e5.firebaseapp.com",
      projectId: "blocksync-d48e5",
      storageBucket: "blocksync-d48e5.firebasestorage.app",
      messagingSenderId: "354921111118",
      appId: "1:354921111118:web:7b7fa1624fd0d37e402d1f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "github-hosted-planner";

    // --- DATE UTILITIES ---
    const getFormattedDateString = (date) => {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    };

    const getStartOfWeek = (date) => {
      const result = new Date(date);
      const day = result.getDay();
      const diff = result.getDate() - day + (day === 0 ? -6 : 1);
      result.setDate(diff);
      return result;
    };

    const getDaysOfWeek = (startOfWeekDate) => {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const nextDay = new Date(startOfWeekDate);
        nextDay.setDate(startOfWeekDate.getDate() + i);
        days.push(nextDay);
      }
      return days;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('week');
      const [user, setUser] = useState(null);
      const [syncStatus, setSyncStatus] = useState('Connecting...');

      const [tasks, setTasks] = useState([]);
      const [notes, setNotes] = useState({});
      
      const [selectedDateStr, setSelectedDateStr] = useState(getFormattedDateString(new Date()));
      const [weekStart, setWeekStart] = useState(getStartOfWeek(new Date()));
      
      // Decoupled local inputs
      const [journalInput, setJournalInput] = useState('');
      const [quickTaskTexts, setQuickTaskTexts] = useState({});
      const isTypingNote = useRef(false);

      // 1. Authenticate User
      useEffect(() => {
        const initAuth = async () => {
          setSyncStatus('Connecting securely...');
          try {
            await signInAnonymously(auth);
          } catch (err) {
            setSyncStatus('Offline Mode');
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setSyncStatus(currentUser ? 'Sync Online' : 'Offline');
        });

        return () => unsubscribe();
      }, []);

      // 2. Real-time Database Listeners
      useEffect(() => {
        if (!user) return;
        setSyncStatus('Syncing database...');

        const tasksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'tasks');
        const unsubscribeTasks = onSnapshot(tasksRef, (snapshot) => {
          const fetchedTasks = [];
          snapshot.forEach(doc => {
            fetchedTasks.push({ id: doc.id, ...doc.data() });
          });
          setTasks(fetchedTasks);
          setSyncStatus('All changes saved');
        });

        const notesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');
        const unsubscribeNotes = onSnapshot(notesRef, (snapshot) => {
          const fetchedNotes = {};
          snapshot.forEach(doc => {
            fetchedNotes[doc.id] = doc.data().content || '';
          });
          setNotes(fetchedNotes);
          setSyncStatus('All changes saved');
        });

        return () => {
          unsubscribeTasks();
          unsubscribeNotes();
        };
      }, [user]);

      // 3. Sync incoming notes ONLY if the user is not actively typing
      useEffect(() => {
        if (!isTypingNote.current) {
          setJournalInput(notes[selectedDateStr] || '');
        }
      }, [selectedDateStr, notes]);

      // 4. Handle typing and debounced saving
      const handleJournalChange = (e) => {
        isTypingNote.current = true;
        setJournalInput(e.target.value);
      };

      useEffect(() => {
        if (!user || !isTypingNote.current) return;
        
        const delayDebounce = setTimeout(async () => {
          setSyncStatus('Saving note...');
          const noteRef = doc(db, 'artifacts', appId, 'users', user.uid, 'notes', selectedDateStr);
          await setDoc(noteRef, { content: journalInput, date: selectedDateStr }, { merge: true });
          
          isTypingNote.current = false;
          setSyncStatus('All changes saved');
        }, 1200);

        return () => clearTimeout(delayDebounce);
      }, [journalInput, selectedDateStr, user]);

      // --- TASK ACTIONS ---
      const handleAddTask = async (dateStr, text) => {
        if (!text || !text.trim() || !user) return;
        const taskId = 'task_' + Date.now();
        const newTask = {
          text: text.trim(),
          completed: false,
          date: dateStr,
          createdAt: Date.now()
        };

        setQuickTaskTexts(prev => ({ ...prev, [dateStr]: '' }));
        const taskRef = doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId);
        await setDoc(taskRef, newTask);
      };

      const handleToggleTask = async (taskId, currentCompletedState) => {
        if (!user) return;
        const taskRef = doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId);
        await setDoc(taskRef, { completed: !currentCompletedState }, { merge: true });
      };

      const handleDeleteTask = async (taskId) => {
        if (!user) return;
        const taskRef = doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId);
        await deleteDoc(taskRef);
      };

      const shiftWeek = (weeksToShift) => {
        const nextWeekStart = new Date(weekStart);
        nextWeekStart.setDate(weekStart.getDate() + (weeksToShift * 7));
        setWeekStart(nextWeekStart);
      };

      // --- RENDERERS ---
      const renderWeekSpread = () => {
        const days = getDaysOfWeek(weekStart);
        return (
          <div className="space-y-6">
            <div className="flex flex-col sm:flex-row justify-between items-center bg-white border border-[#E6DEC4] p-4 rounded-xl shadow-sm gap-4">
              <div className="flex gap-2">
                <button onClick={() => shiftWeek(-1)} className="px-3 py-1.5 text-xs font-bold border border-[#E6DEC4] rounded hover:bg-[#FDFBF7] text-[#5C4D3C] transition">
                  ← Previous
                </button>
                <button onClick={() => setWeekStart(getStartOfWeek(new Date()))} className="px-3 py-1.5 text-xs font-bold border border-[#E6DEC4] rounded hover:bg-[#FDFBF7] text-[#5C4D3C] transition">
                  Current Week
                </button>
                <button onClick={() => shiftWeek(1)} className="px-3 py-1.5 text-xs font-bold border border-[#E6DEC4] rounded hover:bg-[#FDFBF7] text-[#5C4D3C] transition">
                  Next →
                </button>
              </div>
              <span className="font-serif font-bold text-sm text-[#5C4D3C]">
                Week of {weekStart.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })}
              </span>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-7 gap-4">
              {days.map((dayDate) => {
                const dateStr = getFormattedDateString(dayDate);
                const isToday = getFormattedDateString(new Date()) === dateStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);

                return (
                  <div key={dateStr} className={`p-4 rounded-xl border flex flex-col justify-between min-h-[320px] transition ${isToday ? 'bg-[#FDFBF7] border-[#8C6239] shadow-sm' : 'bg-white border-[#E6DEC4] hover:border-[#D0C4A4]'}`}>
                    <div>
                      <div className="border-b border-[#E6DEC4] pb-2 mb-3 flex justify-between items-baseline">
                        <span className="font-serif font-bold text-[#2E251E] text-sm">
                          {dayDate.toLocaleDateString(undefined, { weekday: 'short' })}
                        </span>
                        <span className="font-mono text-xs text-[#8C6239] font-bold">{dayDate.getDate()}</span>
                      </div>
                      <div className="space-y-2 mb-4">
                        {dayTasks.map(task => (
                          <div key={task.id} className="flex items-start justify-between gap-1 group">
                            <div className="flex items-start gap-1.5 flex-1 cursor-pointer" onClick={() => handleToggleTask(task.id, task.completed)}>
                              <input type="checkbox" checked={task.completed} readOnly className="mt-0.5 rounded text-[#2E251E] border-gray-300 w-3.5 h-3.5 cursor-pointer"/>
                              <span className={`text-[11px] leading-tight break-all select-none ${task.completed ? 'line-through opacity-40' : 'text-[#2E251E]'}`}>{task.text}</span>
                            </div>
                            <button onClick={() => handleDeleteTask(task.id)} className="opacity-0 group-hover:opacity-100 text-[10px] text-red-500 hover:text-red-700 px-1 font-bold transition">✕</button>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="pt-2 border-t border-[#F8F5EE]">
                      <input 
                        type="text" value={quickTaskTexts[dateStr] || ''} 
                        onChange={(e) => setQuickTaskTexts(prev => ({ ...prev, [dateStr]: e.target.value }))}
                        onKeyDown={(e) => e.key === 'Enter' && handleAddTask(dateStr, quickTaskTexts[dateStr])}
                        placeholder="+ New Item" className="w-full text-[10px] p-2 border border-[#E6DEC4] rounded focus:outline-none focus:border-[#8C6239] bg-[#FAF8F5] transition"
                      />
                      <div className="flex justify-between items-center mt-2">
                        <button onClick={() => { setSelectedDateStr(dateStr); setActiveTab('journal'); }} className="text-[9px] font-bold uppercase tracking-wider text-[#8C6239] hover:underline">
                          Open Journal
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderMonthSpread = () => {
        const today = new Date();
        const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        const dayOfWeek = startOfMonth.getDay();
        const padDays = dayOfWeek === 0 ? 6 : dayOfWeek - 1; 
        
        const days = Array.from({ length: 42 }, (_, i) => {
          const cellDate = new Date(startOfMonth);
          cellDate.setDate(1 - padDays + i);
          return cellDate;
        });

        return (
          <div className="bg-white border border-[#E6DEC4] p-4 sm:p-6 rounded-xl shadow-sm space-y-6">
            <div className="flex justify-between items-center border-b border-[#E6DEC4] pb-4">
              <h3 className="font-serif font-bold text-[#2E251E] text-xl">
                {today.toLocaleDateString(undefined, { month: 'long', year: 'numeric' })}
              </h3>
              <span className="text-[10px] uppercase font-mono tracking-wider opacity-60">Monthly Overview</span>
            </div>
            <div className="grid grid-cols-7 gap-2 text-center text-[10px] sm:text-xs font-bold tracking-wider opacity-60 text-[#5C4D3C] pb-2">
              <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
            </div>
            <div className="grid grid-cols-7 gap-1 sm:gap-2">
              {days.map((dayDate, idx) => {
                const dateStr = getFormattedDateString(dayDate);
                const isCurrentMonth = dayDate.getMonth() === today.getMonth();
                const isToday = getFormattedDateString(new Date()) === dateStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const hasNotes = !!notes[dateStr];

                return (
                  <div key={idx} onClick={() => { setSelectedDateStr(dateStr); setActiveTab('journal'); }}
                    className={`min-h-[80px] sm:min-h-[100px] p-1.5 sm:p-2 rounded-lg border flex flex-col justify-between transition cursor-pointer text-left ${isToday ? 'border-[#8C6239] bg-[#FDFBF7]' : isCurrentMonth ? 'border-[#EBE4D5] hover:bg-[#FAF8F5]' : 'opacity-30 border-transparent bg-gray-50/50'}`}>
                    <div className="flex justify-between items-start">
                      <span className={`font-mono text-[10px] sm:text-xs font-bold ${isToday ? 'bg-[#8C6239] text-white px-1.5 py-0.5 rounded' : 'text-[#2E251E]'}`}>
                        {dayDate.getDate()}
                      </span>
                      {hasNotes && <span className="text-[10px] text-[#8C6239]">📝</span>}
                    </div>
                    <div className="space-y-1 overflow-hidden mt-1 sm:mt-2">
                      {dayTasks.slice(0, 3).map((t, tIdx) => (
                        <div key={tIdx} className={`text-[8px] sm:text-[9px] truncate ${t.completed ? 'line-through opacity-40' : 'text-[#2E251E]'}`}>• {t.text}</div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderJournalSpread = () => {
        const parsedDate = new Date(selectedDateStr + 'T12:00:00');
        const displayDate = parsedDate.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        const dayTasks = tasks.filter(t => t.date === selectedDateStr);

        return (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="bg-white border border-[#E6DEC4] p-6 rounded-xl shadow-sm flex flex-col justify-between">
              <div>
                <div className="border-b border-[#E6DEC4] pb-3 mb-4 flex justify-between items-baseline">
                  <h3 className="font-serif font-bold text-lg text-[#2E251E]">Task List</h3>
                  <span className="text-[10px] font-mono text-[#8C6239]">{parsedDate.toLocaleDateString()}</span>
                </div>
                <div className="space-y-3 overflow-y-auto max-h-[400px] pr-1">
                  {dayTasks.map(task => (
                    <div key={task.id} className="flex items-center justify-between p-2.5 rounded bg-[#FAF8F5] border border-[#EBE4D5] group">
                      <div className="flex items-start gap-2.5 flex-1 cursor-pointer" onClick={() => handleToggleTask(task.id, task.completed)}>
                        <input type="checkbox" checked={task.completed} readOnly className="mt-0.5 rounded text-[#2E251E] border-gray-300 w-4 h-4 cursor-pointer"/>
                        <span className={`text-xs leading-snug break-all select-none ${task.completed ? 'line-through opacity-40' : 'text-[#2E251E]'}`}>{task.text}</span>
                      </div>
                      <button onClick={() => handleDeleteTask(task.id)} className="text-xs text-red-500 opacity-0 group-hover:opacity-100 px-2 hover:text-red-700 font-bold transition">✕</button>
                    </div>
                  ))}
                </div>
              </div>
              <div className="pt-4 border-t border-[#E6DEC4] mt-6">
                <div className="flex flex-col gap-2">
                  <input type="text" value={quickTaskTexts[selectedDateStr] || ''} onChange={(e) => setQuickTaskTexts(prev => ({ ...prev, [selectedDateStr]: e.target.value }))} onKeyDown={(e) => e.key === 'Enter' && handleAddTask(selectedDateStr, quickTaskTexts[selectedDateStr])} placeholder="Write a new task..." className="w-full text-xs p-2.5 border border-[#E6DEC4] rounded-lg focus:outline-none focus:border-[#8C6239] bg-[#FAF8F5]"/>
                  <button onClick={() => handleAddTask(selectedDateStr, quickTaskTexts[selectedDateStr])} className="text-xs px-4 py-2.5 bg-[#2E251E] text-white rounded-lg hover:bg-[#1A1410] font-semibold transition">Add to List</button>
                </div>
              </div>
            </div>

            <div className="lg:col-span-2 bg-white border border-[#E6DEC4] p-6 rounded-xl shadow-sm flex flex-col min-h-[400px] lg:h-[600px]">
              <div className="border-b border-[#E6DEC4] pb-3 mb-4 flex justify-between items-baseline">
                <h3 className="font-serif font-bold text-xl sm:text-2xl text-[#2E251E]">{displayDate}</h3>
                <span className="text-[10px] font-mono opacity-50 uppercase tracking-wider hidden sm:inline">Journal & Notes</span>
              </div>
              <textarea 
                value={journalInput}
                onChange={handleJournalChange}
                placeholder="Write down your thoughts, notes, and reflections for today..."
                className="flex-1 w-full text-sm font-serif leading-relaxed p-4 bg-[#FAF8F5] border border-[#EBE4D5] rounded-lg focus:outline-none focus:border-[#8C6239] resize-none transition"
              />
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#FAF6F0] text-[#2F251E] font-sans pb-12 selection:bg-[#8C6239] selection:text-white">
          <header className="bg-[#2E251E] text-[#FDFBF7] py-4 px-6 md:px-12 flex justify-between items-center shadow-md">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 rounded bg-[#D0C4A4] text-[#2E251E] flex items-center justify-center font-serif font-bold text-xl shadow-inner">P</div>
              <div>
                <h1 className="font-serif font-bold text-lg tracking-tight">The Physical Planner</h1>
                <p className="text-[10px] tracking-widest uppercase text-[#D0C4A4] opacity-80">Digital Translation</p>
              </div>
            </div>
            <div className="flex flex-col items-end">
              <span className="text-[9px] font-mono uppercase px-2 py-1 rounded tracking-wider bg-black/20 text-white/80">{syncStatus}</span>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-4 md:px-8 py-8">
            <div className="flex border-b border-[#E6DEC4] mb-8 gap-6 overflow-x-auto scrollbar-none">
              <button onClick={() => setActiveTab('week')} className={`pb-3 px-2 font-serif text-base transition relative whitespace-nowrap ${activeTab === 'week' ? 'text-[#2E251E] font-bold' : 'text-[#8C7A6B] hover:text-[#2E251E]'}`}>
                Weekly Spread{activeTab === 'week' && <span className="absolute bottom-0 left-0 right-0 h-[3px] bg-[#8C6239] rounded-t-md"></span>}
              </button>
              <button onClick={() => setActiveTab('month')} className={`pb-3 px-2 font-serif text-base transition relative whitespace-nowrap ${activeTab === 'month' ? 'text-[#2E251E] font-bold' : 'text-[#8C7A6B] hover:text-[#2E251E]'}`}>
                Monthly Grid{activeTab === 'month' && <span className="absolute bottom-0 left-0 right-0 h-[3px] bg-[#8C6239] rounded-t-md"></span>}
              </button>
              <button onClick={() => setActiveTab('journal')} className={`pb-3 px-2 font-serif text-base transition relative whitespace-nowrap ${activeTab === 'journal' ? 'text-[#2E251E] font-bold' : 'text-[#8C7A6B] hover:text-[#2E251E]'}`}>
                Daily Journal{activeTab === 'journal' && <span className="absolute bottom-0 left-0 right-0 h-[3px] bg-[#8C6239] rounded-t-md"></span>}
              </button>
            </div>
            <main className="transition-opacity duration-300">
              {activeTab === 'week' && renderWeekSpread()}
              {activeTab === 'month' && renderMonthSpread()}
              {activeTab === 'journal' && renderJournalSpread()}
            </main>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ServiceWorker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
